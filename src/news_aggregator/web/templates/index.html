<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Aggregator Dashboard</title>
    <style>
        :root {
            --bg: #0f1117;
            --card: #1a1d27;
            --border: #2a2d3a;
            --text: #e2e4ea;
            --text-dim: #8b8fa3;
            --accent: #5b8def;
            --green: #4caf50;
            --yellow: #ff9800;
            --red: #f44336;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        h1 { font-size: 24px; font-weight: 600; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: #4a7de0; }
        .btn-primary:disabled { background: #3a4a6a; cursor: not-allowed; }
        .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--border); }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .stat-card .label { color: var(--text-dim); font-size: 13px; margin-bottom: 8px; }
        .stat-card .value { font-size: 28px; font-weight: 700; }
        .section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .section h2 { font-size: 18px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
        th { color: var(--text-dim); font-weight: 500; }
        td { color: var(--text); }
        .impact-high { color: var(--red); font-weight: 600; }
        .impact-medium { color: var(--yellow); font-weight: 600; }
        .impact-low { color: var(--green); }
        .impact-none { color: var(--text-dim); }
        .url-link { color: var(--accent); text-decoration: none; }
        .url-link:hover { text-decoration: underline; }
        .loading { text-align: center; padding: 40px; color: var(--text-dim); }
        .log-area { background: #0a0c10; border: 1px solid var(--border); border-radius: 8px; padding: 16px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; color: var(--text-dim); }
        .log-area .log-info { color: var(--accent); }
        .log-area .log-error { color: var(--red); }
        .log-area .log-success { color: var(--green); }
        .auto-refresh { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-dim); }
        .auto-refresh input { accent-color: var(--accent); }
        #run-result { margin-top: 16px; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .badge-new { background: rgba(91, 141, 239, 0.2); color: var(--accent); }
        .badge-ongoing { background: rgba(76, 175, 80, 0.2); color: var(--green); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📰 News Aggregator</h1>
            <div style="display: flex; gap: 12px; align-items: center;">
                <label class="auto-refresh">
                    <input type="checkbox" id="auto-refresh"> Auto-refresh (30s)
                </label>
                <button class="btn btn-primary" id="run-btn" onclick="runPipeline()">▶ Run Pipeline</button>
                <button class="btn btn-secondary" onclick="refreshAll()">↻ Refresh</button>
            </div>
        </header>

        <div class="stats" id="stats">
            <div class="stat-card"><div class="label">Subjects Tracked</div><div class="value" id="stat-subjects">-</div></div>
            <div class="stat-card"><div class="label">Articles Processed</div><div class="value" id="stat-articles">-</div></div>
            <div class="stat-card"><div class="label">Failed Articles</div><div class="value" id="stat-dead">-</div></div>
            <div class="stat-card"><div class="label">Last Run</div><div class="value" id="stat-last" style="font-size: 16px;">-</div></div>
        </div>

        <div class="section" id="run-result" style="display: none;">
            <h2>Pipeline Result</h2>
            <div id="run-output"></div>
        </div>

        <div class="section">
            <h2>Recent Activity Log</h2>
            <div class="log-area" id="log-area">Waiting for pipeline run...</div>
        </div>

        <div class="section">
            <h2>Tracked Subjects</h2>
            <table>
                <thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Status</th><th>Impact</th><th>Last Seen</th></tr></thead>
                <tbody id="subjects-body"><tr><td colspan="6" class="loading">Loading...</td></tr></tbody>
            </table>
        </div>

        <div class="section">
            <h2>Recent Articles</h2>
            <table>
                <thead><tr><th>Title</th><th>Feed</th><th>Subject</th><th>Impact</th><th>Fetched</th></tr></thead>
                <tbody id="articles-body"><tr><td colspan="5" class="loading">Loading...</td></tr></tbody>
            </table>
        </div>
    </div>

    <script>
        let autoRefreshInterval = null;

        async function refreshAll() {
            await Promise.all([loadStats(), loadSubjects(), loadArticles()]);
        }

        async function loadStats() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                document.getElementById('stat-subjects').textContent = data.subjects || 0;
                document.getElementById('stat-articles').textContent = data.articles || 0;
                document.getElementById('stat-dead').textContent = data.dead_letters || 0;
                document.getElementById('stat-last').textContent = data.last_poll || 'Never';
            } catch (e) { console.error('Failed to load stats:', e); }
        }

        async function loadSubjects() {
            try {
                const res = await fetch('/api/subjects');
                const data = await res.json();
                const tbody = document.getElementById('subjects-body');
                if (!data.length) { tbody.innerHTML = '<tr><td colspan="6" class="loading">No subjects tracked yet</td></tr>'; return; }
                tbody.innerHTML = data.map(s => `<tr>
                    <td>${s.id}</td>
                    <td>${s.name}</td>
                    <td>${s.category}</td>
                    <td>${s.latest_status || '-'}</td>
                    <td class="impact-${(s.impact_level || 'none').toLowerCase()}">${s.impact_level || 'NONE'}</td>
                    <td>${s.last_seen ? new Date(s.last_seen).toLocaleString() : '-'}</td>
                </tr>`).join('');
            } catch (e) { console.error('Failed to load subjects:', e); }
        }

        async function loadArticles() {
            try {
                const res = await fetch('/api/articles');
                const data = await res.json();
                const tbody = document.getElementById('articles-body');
                if (!data.length) { tbody.innerHTML = '<tr><td colspan="5" class="loading">No articles yet</td></tr>'; return; }
                tbody.innerHTML = data.map(a => `<tr>
                    <td><a class="url-link" href="${a.source_url}" target="_blank">${a.title.substring(0, 60)}...</a></td>
                    <td>${a.feed_name || '-'}</td>
                    <td>${a.subject_name || '-'}</td>
                    <td class="impact-${(a.impact_level || 'none').toLowerCase()}">${a.impact_level || 'NONE'}</td>
                    <td>${a.fetched_at ? new Date(a.fetched_at).toLocaleString() : '-'}</td>
                </tr>`).join('');
            } catch (e) { console.error('Failed to load articles:', e); }
        }

        async function runPipeline() {
            const btn = document.getElementById('run-btn');
            const logArea = document.getElementById('log-area');
            const resultSection = document.getElementById('run-result');
            const runOutput = document.getElementById('run-output');

            btn.disabled = true;
            btn.textContent = '⏳ Running...';
            logArea.innerHTML = '<span class="log-info">Starting pipeline run...</span>\n';
            resultSection.style.display = 'block';
            runOutput.innerHTML = '';

            try {
                const res = await fetch('/api/run', { method: 'POST' });
                const data = await res.json();

                if (data.success) {
                    logArea.innerHTML += `\n<span class="log-success">✓ Pipeline complete. ${data.count} articles processed.</span>`;
                    runOutput.innerHTML = `<p>Processed <strong>${data.count}</strong> articles.</p>`;
                    if (data.results && data.results.length) {
                        runOutput.innerHTML += '<table style="margin-top: 12px;"><thead><tr><th>Title</th><th>Impact</th><th>Assets</th></tr></thead><tbody>' +
                            data.results.map(r => `<tr>
                                <td><a class="url-link" href="${r.url}" target="_blank">${r.title.substring(0, 50)}...</a></td>
                                <td class="impact-${r.impact.toLowerCase()}">${r.impact}</td>
                                <td>${(r.assets || []).join(', ') || '-'}</td>
                            </tr>`).join('') + '</tbody></table>';
                    }
                } else {
                    logArea.innerHTML += `\n<span class="log-error">✗ Pipeline failed: ${data.error}</span>`;
                    runOutput.innerHTML = `<p style="color: var(--red);">Error: ${data.error}</p>`;
                }
            } catch (e) {
                logArea.innerHTML += `\n<span class="log-error">✗ Request failed: ${e.message}</span>`;
            }

            btn.disabled = false;
            btn.textContent = '▶ Run Pipeline';
            await refreshAll();
        }

        // Auto-refresh toggle
        document.getElementById('auto-refresh').addEventListener('change', function() {
            if (this.checked) {
                autoRefreshInterval = setInterval(refreshAll, 30000);
            } else {
                clearInterval(autoRefreshInterval);
            }
        });

        // Initial load
        refreshAll();
    </script>
</body>
</html>
