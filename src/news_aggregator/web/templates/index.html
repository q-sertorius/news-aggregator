<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Aggregator Dashboard</title>
    <style>
        :root {
            --bg: #0f1117;
            --card: #1a1d27;
            --border: #2a2d3a;
            --text: #e2e4ea;
            --text-dim: #8b8fa3;
            --accent: #5b8def;
            --green: #4caf50;
            --yellow: #ff9800;
            --red: #f44336;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        h1 { font-size: 24px; font-weight: 600; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: #4a7de0; }
        .btn-primary:disabled { background: #3a4a6a; cursor: not-allowed; }
        .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--border); }
        .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); }
        .btn-danger:hover { background: var(--red); color: white; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .stat-card .label { color: var(--text-dim); font-size: 13px; margin-bottom: 8px; }
        .stat-card .value { font-size: 28px; font-weight: 700; }
        .section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .section h2 { font-size: 18px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: top; }
        th { color: var(--text-dim); font-weight: 500; position: sticky; top: 0; background: var(--card); }
        td { color: var(--text); }
        .impact-high { color: var(--red); font-weight: 600; }
        .impact-medium { color: var(--yellow); font-weight: 600; }
        .impact-low { color: var(--green); }
        .impact-none { color: var(--text-dim); }
        .url-link { color: var(--accent); text-decoration: none; }
        .url-link:hover { text-decoration: underline; }
        .loading { text-align: center; padding: 40px; color: var(--text-dim); }
        .log-area { background: #0a0c10; border: 1px solid var(--border); border-radius: 8px; padding: 16px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; max-height: 200px; overflow-y: auto; white-space: pre-wrap; color: var(--text-dim); }
        .log-area .log-info { color: var(--accent); }
        .log-area .log-error { color: var(--red); }
        .log-area .log-success { color: var(--green); }
        .auto-refresh { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-dim); }
        .auto-refresh input { accent-color: var(--accent); }
        .controls { display: flex; gap: 12px; align-items: center; }
        #run-result { margin-top: 16px; }
        .badge-new { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: rgba(91, 141, 239, 0.2); color: var(--accent); margin-right: 6px; }
        .badge-ongoing { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: rgba(76, 175, 80, 0.2); color: var(--green); margin-right: 6px; }
        .topic-name { font-weight: 600; color: var(--text); display: block; margin-bottom: 4px; }
        .topic-status { color: var(--text-dim); font-size: 13px; }
        .topic-assets { color: var(--text-dim); font-size: 12px; margin-top: 4px; }
        .topic-reasoning { color: var(--text-dim); font-size: 12px; font-style: italic; margin-top: 2px; }
        .topic-link { font-size: 12px; margin-top: 4px; }
        .flash-row { animation: flash 1.5s ease; }
        @keyframes flash {
            0% { background: rgba(91, 141, 239, 0.15); }
            100% { background: transparent; }
        }
        .table-scroll { max-height: 500px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📰 News Aggregator</h1>
            <div class="controls">
                <button class="btn btn-primary" id="run-btn" onclick="runPipeline()">▶ Run Pipeline</button>
                <button class="btn btn-danger" onclick="clearDb()">🗑 Clear DB</button>
            </div>
        </header>

        <div class="stats" id="stats">
            <div class="stat-card"><div class="label">Topics Tracked</div><div class="value" id="stat-subjects">-</div></div>
            <div class="stat-card"><div class="label">Articles Processed</div><div class="value" id="stat-articles">-</div></div>
            <div class="stat-card"><div class="label">Failed</div><div class="value" id="stat-dead">-</div></div>
            <div class="stat-card"><div class="label">Last Run</div><div class="value" id="stat-last" style="font-size: 16px;">-</div></div>
        </div>

        <div class="section" id="run-result" style="display: none;">
            <h2>Pipeline Result</h2>
            <div id="run-output"></div>
        </div>

        <div class="section">
            <h2>
                Live Topic Feed
                <span style="font-size: 13px; color: var(--text-dim); font-weight: 400;">Each row = latest development on a topic</span>
            </h2>
            <div class="table-scroll">
                <table>
                    <thead><tr>
                        <th style="width: 25%;">Topic</th>
                        <th style="width: 30%;">Latest Status</th>
                        <th style="width: 10%;">Impact</th>
                        <th style="width: 15%;">Assets</th>
                        <th style="width: 10%;">Category</th>
                        <th style="width: 10%;">Updated</th>
                    </tr></thead>
                    <tbody id="topics-body"><tr><td colspan="6" class="loading">No topics tracked yet</td></tr></tbody>
                </table>
            </div>
        </div>

        <div class="section">
            <h2>Activity Log</h2>
            <div class="log-area" id="log-area">Waiting for pipeline run...</div>
        </div>
    </div>

    <script>
        let autoRefreshInterval = null;
        let prevSubjectIds = new Set();

        async function refreshAll() {
            await Promise.all([loadStats(), loadTopics()]);
        }

        async function loadStats() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                document.getElementById('stat-subjects').textContent = data.subjects || 0;
                document.getElementById('stat-articles').textContent = data.articles || 0;
                document.getElementById('stat-dead').textContent = data.dead_letters || 0;
                document.getElementById('stat-last').textContent = data.last_poll || 'Never';
            } catch (e) { console.error('Failed to load stats:', e); }
        }

        async function loadTopics() {
            try {
                const res = await fetch('/api/topics');
                const data = await res.json();
                const tbody = document.getElementById('topics-body');

                if (!data.length) {
                    tbody.innerHTML = '<tr><td colspan="6" class="loading">No topics tracked yet. Run the pipeline to start.</td></tr>';
                    return;
                }

                // Detect new or updated subjects for flash animation
                const currentIds = new Set(data.map(t => t.id));
                const newIds = data.filter(t => !prevSubjectIds.has(t.id));

                tbody.innerHTML = data.map(t => {
                    const isNew = newIds.some(n => n.id === t.id);
                    const flashClass = isNew ? 'flash-row' : '';
                    const badge = t.classification === 'NEW_SUBJECT'
                        ? '<span class="badge-new">NEW</span>'
                        : '<span class="badge-ongoing">ONGOING</span>';
                    const assetStr = (t.assets && t.assets.length) ? t.assets.join(', ') : '-';

                    return `<tr class="${flashClass}">
                        <td>
                            <span class="topic-name">${badge}${t.name}</span>
                        </td>
                        <td>
                            <span class="topic-status">${t.latest_status || '-'}</span>
                            ${t.reasoning ? `<div class="topic-reasoning">${t.reasoning}</div>` : ''}
                            ${t.source_url ? `<div class="topic-link"><a class="url-link" href="${t.source_url}" target="_blank">Source ↗</a></div>` : ''}
                        </td>
                        <td class="impact-${(t.impact_level || 'none').toLowerCase()}">${t.impact_level || 'NONE'}</td>
                        <td class="topic-assets">${assetStr}</td>
                        <td>${t.category || '-'}</td>
                        <td style="font-size: 12px; color: var(--text-dim);">${t.last_seen ? new Date(t.last_seen).toLocaleString() : '-'}</td>
                    </tr>`;
                }).join('');

                prevSubjectIds = currentIds;
            } catch (e) { console.error('Failed to load topics:', e); }
        }

        async function runPipeline() {
            const btn = document.getElementById('run-btn');
            const logArea = document.getElementById('log-area');
            const resultSection = document.getElementById('run-result');
            const runOutput = document.getElementById('run-output');

            btn.disabled = true;
            btn.textContent = '⏳ Running...';
            logArea.innerHTML = '<span class="log-info">Starting pipeline run...</span>\n';
            resultSection.style.display = 'block';
            runOutput.innerHTML = '';

            try {
                const res = await fetch('/api/run', { method: 'POST' });
                const data = await res.json();

                if (data.success) {
                    logArea.innerHTML += `\n<span class="log-success">✓ Pipeline complete. ${data.count} articles processed.</span>`;
                    runOutput.innerHTML = `<p>Processed <strong>${data.count}</strong> articles.</p>`;
                    if (data.results && data.results.length) {
                        runOutput.innerHTML += '<table style="margin-top: 12px;"><thead><tr><th>Title</th><th>Impact</th><th>Assets</th></tr></thead><tbody>' +
                            data.results.map(r => `<tr>
                                <td><a class="url-link" href="${r.url}" target="_blank">${r.title.substring(0, 50)}...</a></td>
                                <td class="impact-${r.impact.toLowerCase()}">${r.impact}</td>
                                <td>${(r.assets || []).join(', ') || '-'}</td>
                            </tr>`).join('') + '</tbody></table>';
                    }
                } else {
                    logArea.innerHTML += `\n<span class="log-error">✗ Pipeline failed: ${data.error}</span>`;
                    runOutput.innerHTML = `<p style="color: var(--red);">Error: ${data.error}</p>`;
                }
            } catch (e) {
                logArea.innerHTML += `\n<span class="log-error">✗ Request failed: ${e.message}</span>`;
            }

            btn.disabled = false;
            btn.textContent = '▶ Run Pipeline';
            await refreshAll();
        }

        async function clearDb() {
            if (!confirm('Are you sure? This will delete all subjects, articles, and history.')) return;

            try {
                const res = await fetch('/api/clear', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    prevSubjectIds = new Set();
                    document.getElementById('log-area').innerHTML = '<span class="log-success">✓ Database cleared.</span>';
                    await refreshAll();
                } else {
                    alert('Failed to clear database: ' + data.error);
                }
            } catch (e) {
                alert('Request failed: ' + e.message);
            }
        }

        // Auto-refresh every 10 seconds
        autoRefreshInterval = setInterval(refreshAll, 10000);

        // Initial load
        refreshAll();
    </script>
</body>
</html>
