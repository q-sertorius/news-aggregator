<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Aggregator Dashboard</title>
    <style>
        :root {
            --bg: #0f1117;
            --card: #1a1d27;
            --border: #2a2d3a;
            --text: #e2e4ea;
            --text-dim: #8b8fa3;
            --accent: #5b8def;
            --green: #4caf50;
            --yellow: #ff9800;
            --red: #f44336;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        h1 { font-size: 24px; font-weight: 600; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; }
        .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--border); }
        .section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .section h2 { font-size: 18px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: top; }
        th { color: var(--text-dim); font-weight: 500; position: sticky; top: 0; background: var(--card); }
        td { color: var(--text); }
        .impact-high { color: var(--red); font-weight: 600; }
        .impact-medium { color: var(--yellow); font-weight: 600; }
        .impact-low { color: var(--green); }
        .impact-none { color: var(--text-dim); }
        .url-link { color: var(--accent); text-decoration: none; }
        .url-link:hover { text-decoration: underline; }
        .loading { text-align: center; padding: 40px; color: var(--text-dim); }
        .controls { display: flex; gap: 12px; align-items: center; }
        .badge-new { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: rgba(91, 141, 239, 0.2); color: var(--accent); margin-right: 6px; }
        .badge-ongoing { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: rgba(76, 175, 80, 0.2); color: var(--green); margin-right: 6px; }
        .topic-name { font-weight: 600; color: var(--text); display: block; margin-bottom: 4px; }
        .topic-status { color: var(--text-dim); font-size: 13px; }
        .topic-reasoning { color: var(--text-dim); font-size: 12px; font-style: italic; margin-top: 2px; }
        .flash-row { animation: flash 1.5s ease; }
        @keyframes flash {
            0% { background: rgba(91, 141, 239, 0.15); }
            100% { background: transparent; }
        }
        .table-scroll { max-height: 80vh; overflow-y: auto; }
        .modal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.4); }
        .modal-content { background-color: var(--card); margin: 10% auto; padding: 20px; border: 1px solid var(--border); border-radius: 12px; width: 80%; max-width: 600px; max-height: 80vh; overflow-y: auto; position: relative; }
        .close-button { color: var(--text-dim); float: right; font-size: 28px; font-weight: bold; }
        .close-button:hover, .close-button:focus { color: var(--text); text-decoration: none; cursor: pointer; }
        .history-item { border-bottom: 1px solid var(--border); padding: 10px 0; }
        .history-item:last-child { border-bottom: none; }
        .history-article-title { font-size: 13px; margin-top: 4px; }
        .history-status { font-size: 14px; color: var(--text); margin-bottom: 4px; }
        .history-meta { font-size: 12px; color: var(--text-dim); display: flex; align-items: center; flex-wrap: wrap; }
        .history-meta .url-link { margin-right: 8px; }
        .status-history-btn { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 12px; margin-left: 8px; padding: 0; text-decoration: underline; }
        .status-history-btn:hover { opacity: 0.8; }
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content { display: none; position: absolute; background-color: var(--card); min-width: 250px; box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2); z-index: 1; border-radius: 8px; border: 1px solid var(--border); right: 0; top: 100%; margin-top: 8px; padding: 8px 0; }
        .dropdown-content button { color: var(--text); padding: 12px 16px; text-decoration: none; display: block; background: none; border: none; width: 100%; text-align: left; cursor: pointer; font-size: 14px; transition: background-color 0.2s; }
        .dropdown-content button:hover { background-color: var(--border); }
        .dropdown-stat-label { color: var(--text-dim); font-size: 13px; padding: 8px 16px 4px 16px; cursor: default; }
        .dropdown-stat-item { color: var(--text); padding: 4px 16px; font-size: 13px; white-space: nowrap; cursor: default; }
        .dropdown-stat-item strong { color: var(--text); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📰 News Aggregator</h1>
            <div class="controls">
                <div class="dropdown" id="debugDropdown">
                    <button class="btn btn-secondary" id="debugBtn">Debug ▼</button>
                    <div class="dropdown-content" id="dropdownContent">
                        <div class="dropdown-stat-item">Topics: <strong id="dropdown-stat-subjects">-</strong></div>
                        <div class="dropdown-stat-item">Articles: <strong id="dropdown-stat-articles">-</strong></div>
                        <div class="dropdown-stat-item">Failed: <strong id="dropdown-stat-dead">-</strong></div>
                        <div class="dropdown-stat-item">Last Run: <strong id="dropdown-stat-last">-</strong></div>
                        <hr style="border-color: var(--border); margin: 8px 0;">
                        <button onclick="runPipeline()">▶ Run Pipeline</button>
                        <button onclick="clearDb()">🗑 Clear DB</button>
                    </div>
                </div>
            </div>
        </header>

        <div class="section">
            <h2>Live Topic Feed</h2>
            <div class="table-scroll">
                <table>
                    <thead><tr>
                        <th style="width: 35%;">Topic</th>
                        <th style="width: 40%;">Latest Status</th>
                        <th style="width: 10%;">Impact</th>
                        <th style="width: 15%;">Updated</th>
                    </tr></thead>
                    <tbody id="topics-body"><tr><td colspan="4" class="loading">No topics tracked yet</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="historyModal" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="closeModal()">&times;</span>
            <h2 id="historyModalTitle">Topic History</h2>
            <div id="historyModalBody"></div>
        </div>
    </div>

    <script>
        let autoRefreshInterval = null;
        let prevSubjectIds = new Set();

        async function refreshAll() {
            await Promise.all([loadStats(), loadTopics()]);
        }

        async function loadStats() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                document.getElementById('dropdown-stat-subjects').innerHTML = `Topics: <strong>${data.subjects || 0}</strong>`;
                document.getElementById('dropdown-stat-articles').innerHTML = `Articles: <strong>${data.articles || 0}</strong>`;
                document.getElementById('dropdown-stat-dead').innerHTML = `Failed: <strong>${data.dead_letters || 0}</strong>`;
                document.getElementById('dropdown-stat-last').innerHTML = `Last Run: <strong>${data.last_poll || 'Never'}</strong>`;
            } catch (e) { console.error('Failed to load stats:', e); }
        }

        async function loadTopics() {
            try {
                const res = await fetch('/api/topics');
                let data = await res.json();
                const tbody = document.getElementById('topics-body');

                // Filter out LOW and NONE impact topics
                data = data.filter(t => (t.impact_level || 'NONE').toUpperCase() !== 'LOW' && (t.impact_level || 'NONE').toUpperCase() !== 'NONE');

                if (!data.length) {
                    tbody.innerHTML = '<tr><td colspan="4" class="loading">No high or medium impact topics to display.</td></tr>';
                    return;
                }

                const currentIds = new Set(data.map(t => t.id));
                const newIds = data.filter(t => !prevSubjectIds.has(t.id));

                tbody.innerHTML = data.map(t => {
                    const isNew = newIds.some(n => n.id === t.id);
                    const flashClass = isNew ? 'flash-row' : '';
                    const badge = t.classification === 'NEW_SUBJECT' ? '<span class="badge-new">NEW</span>' : '<span class="badge-ongoing">ONGOING</span>';

                    return `<tr class="${flashClass}">
                        <td><span class="topic-name">${badge}${t.name}</span></td>
                        <td>
                            <span class="topic-status">${t.latest_status || '-'}</span>
                            <button class="status-history-btn" onclick="showSubjectHistory(${t.id}, '${t.name.replace(/'/g, "\\'")}')">View History</button>
                            ${t.reasoning ? `<div class="topic-reasoning">${t.reasoning}</div>` : ''}
                        </td>
                        <td class="impact-${(t.impact_level || 'none').toLowerCase()}">${t.impact_level || 'NONE'}</td>
                        <td style="font-size: 12px; color: var(--text-dim);">${t.last_seen ? new Date(t.last_seen).toLocaleString() : '-'}</td>
                    </tr>`;
                }).join('');

                prevSubjectIds = currentIds;
            } catch (e) { console.error('Failed to load topics:', e); }
        }

        async function runPipeline() {
            const btn = document.getElementById('debugBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Running...';
            try {
                const res = await fetch('/api/run', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    alert(`✓ Pipeline complete. ${data.count} articles processed.`);
                } else {
                    alert(`✗ Pipeline failed: ${data.error}`);
                }
            } catch (e) {
                alert(`✗ Request failed: ${e.message}`);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Debug ▼'; 
                hideDropdown();
                await refreshAll();
            }
        }

        async function clearDb() {
            if (!confirm('Are you sure? This will delete all subjects, articles, and history.')) return;
            const btn = document.getElementById('debugBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Clearing...';
            try {
                const res = await fetch('/api/clear', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    prevSubjectIds = new Set();
                    alert('✓ Database cleared.');
                } else {
                    alert('Failed to clear database: ' + data.error);
                }
            } catch (e) {
                alert('Request failed: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Debug ▼';
                hideDropdown();
                await refreshAll();
            }
        }

        async function showSubjectHistory(subjectId, subjectName) {
            const modal = document.getElementById('historyModal');
            const modalTitle = document.getElementById('historyModalTitle');
            const modalBody = document.getElementById('historyModalBody');
            modalTitle.textContent = `History for: ${subjectName}`;
            modalBody.innerHTML = '<div class="loading">Loading history...</div>';
            modal.style.display = 'block';
            try {
                const res = await fetch(`/api/subject_history/${subjectId}`);
                const history = await res.json();
                if (history.length) {
                    modalBody.innerHTML = history.map(item => `
                        <div class="history-item">
                            <div class="history-status">${item.status_snapshot}</div>
                            <div class="history-meta">
                                ${item.article_source_url ? `<a class="url-link" href="${item.article_source_url}" target="_blank">Source ↗</a> | ` : ''}
                                Impact: <span class="history-impact-${(item.impact_level || 'none').toLowerCase()}">${item.impact_level || 'NONE'}</span>
                                | Updated: ${new Date(item.updated_at).toLocaleString()}
                            </div>
                        </div>
                    `).join('');
                } else {
                    modalBody.innerHTML = '<p>No history available for this subject.</p>';
                }
            } catch (e) {
                console.error('Failed to load subject history:', e);
                modalBody.innerHTML = `<p style="color: var(--red);">Error loading history: ${e.message}</p>`;
            }
        }

        function closeModal() {
            document.getElementById('historyModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('historyModal');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        const debugDropdown = document.getElementById('debugDropdown');
        const dropdownContent = document.getElementById('dropdownContent');
        let dropdownTimeout;
        function showDropdown() {
            clearTimeout(dropdownTimeout);
            dropdownContent.style.display = 'block';
        }
        function hideDropdown() {
            dropdownTimeout = setTimeout(() => {
                dropdownContent.style.display = 'none';
            }, 200); 
        }
        debugDropdown.addEventListener('mouseover', showDropdown);
        debugDropdown.addEventListener('mouseout', hideDropdown);

        autoRefreshInterval = setInterval(refreshAll, 5000);
        refreshAll();
    </script>
</body>
</html>
